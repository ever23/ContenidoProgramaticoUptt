<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Notas UPTT</title>
    <!-- Vinculamos el archivo CSS externo -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header class="header-principal">
        <h1>🎓 Gestión de Estudiantes</h1>
        <p>Interfaz estática (HTML/CSS) - Evaluación 3</p>
    </header>

    <main class="contenedor">
        
        <!-- Tarjeta del Formulario -->
        <section class="tarjeta">
            <h2>Registrar Nuevo Estudiante</h2>
            <form action="#" method="GET">
                <div class="grupo-input">
                    <label for="cedula">Cédula de Identidad:</label>
                    <input type="number" id="cedula" placeholder="Ej: 30123456" required>
                </div>
                
                <div class="grupo-input">
                    <label for="nombre">Nombre Completo:</label>
                    <input type="text" id="nombre" placeholder="Ej: María López" required>
                </div>

                <div class="grupo-input">
                    <label for="carrera">Carrera:</label>
                    <select id="carrera">
                        <option value="Informatica">Informática</option>
                        <option value="Administracion">Administración</option>
                        <option value="Mantenimiento">Mantenimiento</option>
                    </select>
                </div>

                <button type="button" class="btn-guardar">💾 Guardar Estudiante</button>
            </form>
        </section>

        <!-- Tarjeta de la Lista -->
        <section class="tarjeta">
            <h2>Directorio de Estudiantes</h2>
            <div class="tabla-responsiva">
                <table>
                    <thead>
                        <tr>
                            <th>Cédula</th>
                            <th>Nombre</th>
                            <th>Carrera</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Datos de ejemplo "quemados" (Hardcoded) -->
                        <tr>
                            <td>30111222</td>
                            <td>Ana López</td>
                            <td>Informática</td>
                            <td><button class="btn-accion">Ver Notas</button></td>
                        </tr>
                        <tr>
                            <td>28999888</td>
                            <td>Carlos Mendoza</td>
                            <td>Administración</td>
                            <td><button class="btn-accion">Ver Notas</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <footer>
        <p>Programación II · Trayecto II · UPTT</p>
    </footer>

</body>
</html>
