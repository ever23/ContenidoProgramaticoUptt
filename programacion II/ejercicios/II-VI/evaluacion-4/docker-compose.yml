services:
  # SERVICIO 1: Nuestra aplicación Web Node.js
  app:
    build: .
    container_name: uptt-app-segura
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=uptt_seguridad
    restart: unless-stopped
    depends_on:
      - db

  # SERVICIO 2: Base de Datos MariaDB
  db:
    image: mariadb:10.5
    container_name: uptt-db-segura
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: uptt_seguridad
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:
