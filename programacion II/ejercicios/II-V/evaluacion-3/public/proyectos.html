<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Proyectos - Eval 3</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .table-container {
            width: 100%;
            overflow-x: auto;
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: var(--primary-color);
            color: white;
        }
        .search-container {
            margin-bottom: 20px;
        }
        .search-container input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn-small {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 5px;
            font-size: 0.9em;
        }
        .btn-edit {
            background-color: #f39c12;
            color: white;
        }
        .btn-delete {
            background-color: #e74c3c;
            color: white;
        }
        .btn-back {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }
        /* Modal simple para editar */
        #modalEditar {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        #modalEditar.active {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <div style="max-width: 800px; margin: 40px auto; padding: 20px;">
        <a href="index.html" class="btn-back">&larr; Volver al Registro</a>
        
        <header style="text-align: center; margin-bottom: 30px;">
            <h1>Proyectos Registrados</h1>
            <p>Directorio de la Unidad de Innovación</p>
        </header>

        <div class="search-container">
            <input type="search" id="searchInput" placeholder="Buscar por Título o Autor en tiempo real...">
        </div>

        <div id="feedback" class="hidden"></div>

        <div class="table-container">
            <table id="tablaProyectos">
                <thead>
                    <tr>
                        <th>Título</th>
                        <th>Autor</th>
                        <th>Trayecto</th>
                        <th>Fecha</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="listaCuerpo">
                    <!-- Filas inyectadas por JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- MODAL DE EDICIÓN -->
    <div id="modalEditar">
        <div class="modal-content">
            <h2 style="margin-bottom: 15px;">Editar Proyecto</h2>
            <form id="formEditar">
                <input type="hidden" id="editId">
                <div class="input-group">
                    <label>Título del Proyecto</label>
                    <input type="text" id="editTitulo" required>
                </div>
                <div class="input-group">
                    <label>Autor Principal</label>
                    <input type="text" id="editAutor" required>
                </div>
                <div class="input-group">
                    <label>Trayecto</label>
                    <select id="editTrayecto">
                        <option value="I">Trayecto I</option>
                        <option value="II">Trayecto II</option>
                        <option value="III">Trayecto III</option>
                        <option value="IV">Trayecto IV</option>
                    </select>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button type="submit" style="flex: 1;">Guardar Cambios</button>
                    <button type="button" id="btnCerrarModal" style="flex: 1; background: #95a5a6;">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/proyectos.js"></script>
</body>
</html>
