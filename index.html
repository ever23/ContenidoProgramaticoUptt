<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Cátedra UPTT - Algorítmica y Programación</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Manuales de Cátedra Universitarios">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <!-- Tipografías Premium de Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Tema Visual: Docsify Themeable (Simple Dark) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  
  <!-- Estilos Personalizados Premium -->
  <style>
    :root {
      /* Colores y Temática General (Inspirado en el CV Enyerber Franco) */
      --theme-color: #00f2ff; /* Cian Eléctrico */
      --base-color: #e2e8f0; /* Texto base muy legible */
      --base-background-color: #12121e; /* Deep Navy/Black del CV */
      
      /* Tipografía Premium */
      --base-font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --base-font-size: 16px;
      --base-line-height: 1.7;
      
      /* Barra Lateral (Sidebar) */
      --sidebar-background: #0a0a0c; /* Sidebar sutilmente contrastado del CV */
      --sidebar-border-color: rgba(0, 242, 255, 0.1); /* Border subtle del CV */
      --sidebar-name-color: #ffffff;
      --sidebar-name-font-weight: 800;
      --sidebar-nav-link-color--active: #39ff14; /* Verde Neón del CV */
      --sidebar-nav-link-font-weight--active: 600;
      --sidebar-nav-link-border-color--active: #39ff14;
      
      /* Buscador (Search) */
      --search-background: #12121e;
      --search-border-color: rgba(0, 242, 255, 0.2);
      --search-input-color: #ffffff;
      --search-input-placeholder-color: #94a3b8;
      
      /* Bloques de Código */
      --code-font-family: 'JetBrains Mono', "Fira Code", monospace;
      --code-theme-background: #0a0a0c; /* Más oscuro para resaltar el código */
      --code-font-size: 14px;
      
      /* Citas / Blockquotes (Tips y Notas) */
      --blockquote-border-color: #39ff14; /* Verde neón para tips */
      --blockquote-background: rgba(57, 255, 20, 0.05); /* Verde con baja opacidad */
      --blockquote-color: #e2e8f0;
      
      /* Cabeceras */
      --heading-color: #ffffff;
      --heading-h1-font-weight: 800;
      --heading-h2-font-weight: 700;
    }

    /* === Modificaciones CSS Extra Premium === */

    /* Scrollbar personalizada y elegante */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--base-background-color); }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--theme-color); }

    /* Efecto gradiente premium para los títulos principales (H1) */
    .markdown-section h1 {
      background: linear-gradient(to right, #00f2ff, #39ff14);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2rem;
      border-bottom: none; /* Elimina la línea plana por defecto */
    }

    /* Títulos secundarios (H2) */
    .markdown-section h2 {
      color: #39ff14;
      border-bottom: 1px solid rgba(0, 242, 255, 0.1);
    }

    /* Bloques de código con bordes redondeados y sombras sutiles */
    .markdown-section pre {
      border: 1px solid rgba(0, 242, 255, 0.1);
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.15);
    }

    /* Citas enriquecidas (Blockquotes con diseño de "Tarjeta") */
    .markdown-section blockquote {
      border-radius: 0 10px 10px 0;
      padding: 1.2rem 1.5rem;
      border-left: 4px solid var(--blockquote-border-color);
      box-shadow: inset 0px 0px 10px rgba(0,0,0,0.2);
    }
    
    /* Enlaces con transición suave al pasar el mouse */
    .markdown-section a {
      color: #00f2ff;
      transition: all 0.3s ease-in-out;
    }
    .markdown-section a:hover {
      color: #39ff14;
      text-decoration: none;
      text-shadow: 0 0 8px rgba(57, 255, 20, 0.4);
    }

    /* Strong y Bold con color de acento para destacar */
    .markdown-section strong, .markdown-section b {
      color: #00f2ff;
    }
  </style>
</head>

<body>
  <div id="app">Cargando material académico...</div>
  <script>
    window.$docsify = {
      name: '👨‍💻 Prof: Enyerber Franco',
      repo: 'https://github.com/ever23/ContenidoProgramaticoUptt',
      loadSidebar: true,
      homepage: 'inicio.md', // <-- Desvincula el README y usa esta página como inicio
      subMaxLevel: 3,
      auto2top: true,
      
      // Opciones exclusivas de Themeable
      themeable: {
          readyTransition : true, // Transición suave al cargar
          responsiveTables: true  // Tablas que se adaptan a móviles
      },

      // Configuración del buscador
      search: {
        placeholder: 'Buscar un tema...',
        noData: 'No se encontraron resultados',
        depth: 3
      }
    }
  </script>

  <!-- Núcleo de Docsify -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  
  <!-- Plugin Themeable (Debe ir inmediatamente después del núcleo) -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>

  <!-- Plugins extra -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
</body>

</html>
