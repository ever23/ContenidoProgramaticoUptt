<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Prof. Enyerber Franco</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Manuales de Cátedra Universitarios">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <!-- Tipografías Premium de Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">

  <!-- Tema Visual: Docsify Themeable (Simple Dark) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">

  <!-- Estilos Personalizados Premium -->
  <style>
    :root {
      /* Colores y Temática General (Inspirado en el CV Enyerber Franco) */
      --theme-color: #00f2ff;
      /* Cian Eléctrico */
      --base-color: #e2e8f0;
      /* Texto base muy legible */
      --base-background-color: #12121e;
      /* Deep Navy/Black del CV */

      /* Tipografía Premium */
      --base-font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --base-font-size: 16px;
      --base-line-height: 1.7;

      /* Barra Lateral (Sidebar) */
      --sidebar-background: #0a0a0c;
      /* Sidebar sutilmente contrastado del CV */
      --sidebar-border-color: rgba(0, 242, 255, 0.1);
      /* Border subtle del CV */
      --sidebar-name-color: #ffffff;
      --sidebar-name-font-weight: 800;
      --sidebar-nav-link-color--active: #39ff14;
      /* Verde Neón del CV */
      --sidebar-nav-link-font-weight--active: 600;
      --sidebar-nav-link-border-color--active: #39ff14;

      /* Buscador (Search) */
      --search-background: #12121e;
      --search-border-color: rgba(0, 242, 255, 0.2);
      --search-input-color: #ffffff;
      --search-input-placeholder-color: #94a3b8;

      /* Bloques de Código */
      --code-font-family: 'JetBrains Mono', "Fira Code", monospace;
      --code-theme-background: #0a0a0c;
      /* Más oscuro para resaltar el código */
      --code-font-size: 14px;

      /* Citas / Blockquotes (Tips y Notas) */
      --blockquote-border-color: #39ff14;
      /* Verde neón para tips */
      --blockquote-background: rgba(57, 255, 20, 0.05);
      /* Verde con baja opacidad */
      --blockquote-color: #e2e8f0;

      /* Cabeceras */
      --heading-color: #ffffff;
      --heading-h1-font-weight: 800;
      --heading-h2-font-weight: 700;
    }

    /* === Modificaciones CSS Extra Premium === */

    /* Scrollbar personalizada y elegante */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--base-background-color);
    }

    ::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--theme-color);
    }

    /* Efecto gradiente premium para los títulos principales (H1) */
    .markdown-section h1 {
      background: linear-gradient(to right, #00f2ff, #39ff14);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2rem;
      border-bottom: none;
      /* Elimina la línea plana por defecto */
    }

    /* Títulos secundarios (H2) */
    .markdown-section h2 {
      color: #39ff14;
      border-bottom: 1px solid rgba(0, 242, 255, 0.1);
    }

    /* Bloques de código con bordes redondeados y sombras sutiles */
    .markdown-section pre {
      border: 1px solid rgba(0, 242, 255, 0.1);
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.15);
    }

    /* Citas enriquecidas (Blockquotes con diseño de "Tarjeta") */
    .markdown-section blockquote {
      border-radius: 0 10px 10px 0;
      padding: 1.2rem 1.5rem;
      border-left: 4px solid var(--blockquote-border-color);
      box-shadow: inset 0px 0px 10px rgba(0, 0, 0, 0.2);
    }

    /* Enlaces con transición suave al pasar el mouse */
    .markdown-section a {
      color: #00f2ff;
      transition: all 0.3s ease-in-out;
    }

    .markdown-section a:hover {
      color: #39ff14;
      text-decoration: none;
      text-shadow: 0 0 8px rgba(57, 255, 20, 0.4);
    }

    /* Animación premium para los enlaces del Sidebar (estilo CV) */
    .sidebar-nav li>a {
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1) !important;
      border: 1px solid transparent;
      border-radius: 8px;
    }

    .sidebar-nav li>a:hover {
      color: #00f2ff !important;
      background: rgba(0, 242, 255, 0.08);
      border-color: rgba(0, 242, 255, 0.2);
      transform: translateX(8px);
      /* Desplazamiento sutil a la derecha */
    }

    /* Elemento activo en el sidebar */
    .sidebar-nav li.active>a {
      color: #39ff14 !important;
      background: rgba(57, 255, 20, 0.08);
      border-color: rgba(57, 255, 20, 0.2);
      transform: translateX(8px);
    }

    /* --- EFECTOS DE FONDO ANIMADO (MATRIX) --- */
    #matrix-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.35;
      pointer-events: none;
      overflow: hidden;
      background: transparent;
    }

    /* Asegurar que el contenido del sidebar esté por encima del matrix */
    .sidebar {
      position: relative;
    }

    .sidebar>* {
      position: relative;
      z-index: 1;
    }

    .bg-glow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 80% 20%, rgba(0, 242, 255, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 20% 80%, rgba(57, 255, 20, 0.03) 0%, transparent 40%);
      z-index: -1;
      pointer-events: none;
    }

    .code-line {
      position: absolute;
      white-space: nowrap;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      color: rgba(148, 163, 184, 0.5);
      user-select: none;
      opacity: 0;
      animation: scrollUp 15s linear infinite;
    }

    .sh-keyword {
      color: #c678dd;
      font-weight: 700;
    }

    .sh-string {
      color: #98c379;
    }

    .sh-function {
      color: #61afef;
    }

    .sh-comment {
      color: #5c6370;
      font-style: italic;
    }

    .sh-number {
      color: #d19a66;
    }

    @keyframes scrollUp {
      0% {
        transform: translateY(110vh);
        opacity: 0;
      }

      5% {
        opacity: 0.6;
      }

      95% {
        opacity: 0.6;
      }

      100% {
        transform: translateY(-10vh);
        opacity: 0;
      }
    }

    /* Strong y Bold con color de acento para destacar */
    .markdown-section strong,
    .markdown-section b {
      color: #00f2ff;
    }

    /* --- OPTIMIZACIONES PARA MÓVILES (RESPONSIVE) --- */
    @media screen and (max-width: 768px) {
      :root {
        --base-font-size: 15px;
      }

      /* Eliminar espacios muertos en la cabecera del manual */
      .markdown-section {
        padding: 0.5rem 1rem !important;
      }

      .markdown-section h1 {
        font-size: 1.6rem;
        margin-top: 0 !important;
        /* Totalmente arriba */
        padding-top: 0 !important;
      }

      /* Sidebar como Overlay Fijo e Impenetrable */
      .sidebar {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        transform: translateX(-100vw) !important;
        /* Escondido */
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1) !important;
        z-index: 1000 !important; /* Bajamos el sidebar para que el botón gane */
        background-color: var(--sidebar-background) !important;
        border: none !important;
      }

      /* Clase que Docsify aplica al abrir el menú en móvil */
      body.close .sidebar {
        transform: translateX(0) !important;
      }

      /* Evitar que el contenido se mueva o se "lance" al otro lado */
      .content,
      body,
      main {
        transform: none !important;
        transition: none !important;
      }

      /* Botón de Menú (Toggle) Estilo Floating Premium */
      .sidebar-toggle {
        position: fixed !important;
        background: rgba(10, 10, 12, 0.85) !important;
        backdrop-filter: blur(12px) saturate(180%);
        -webkit-backdrop-filter: blur(12px) saturate(180%);
        border: 1px solid rgba(0, 242, 255, 0.25) !important;
        top: 15px !important;
        left: 15px !important;
        width: 48px !important;
        height: 48px !important;
        padding: 0 !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        z-index: 10001 !important;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1) !important;
        border-radius: 12px !important;
      }

      /* Efecto al presionar o pasar el mouse */
      .sidebar-toggle:active {
        transform: scale(0.9);
      }

      /* El icono de las 3 barras (hamburguesa) */
      .sidebar-toggle span {
        width: 22px !important;
        height: 2px !important;
        background-color: var(--theme-color) !important;
        box-shadow: 0 0 10px var(--theme-color);
        margin: 4px 0 !important;
        display: block;
        border-radius: 4px;
        transition: all 0.3s ease;
      }

      /* BOTÓN DE MENÚ / CERRAR (MINIMALISTA IZQUIERDA) */
      .sidebar-toggle {
        position: fixed !important;
        display: flex !important;
        visibility: visible !important;
        opacity: 1 !important;
        left: 15px !important; /* Esquina superior izquierda */
        right: auto !important;
        top: 15px !important;
        width: 40px !important;
        height: 40px !important;
        background: transparent !important; /* Sin círculo de fondo */
        border: none !important; /* Sin bordes */
        border-radius: 0 !important;
        box-shadow: none !important; /* Sin sombras */
        z-index: 99999 !important;
        cursor: pointer !important;
        justify-content: center !important;
        align-items: center !important;
        transform: none !important; 
        max-width: 40px !important;
      }

      .sidebar-toggle span {
        background-color: var(--theme-color) !important; /* Barras cian */
        height: 2px !important;
        width: 20px !important;
        box-shadow: 0 0 5px var(--theme-color);
        transition: all 0.3s ease !important;
      }

      /* TRANSFORMACIÓN A "X" CUANDO ESTÁ ABIERTO */
      body.close .sidebar-toggle span:nth-child(1) {
        transform: rotate(45deg) translate(5px, 5px) !important;
      }
      body.close .sidebar-toggle span:nth-child(2) {
        opacity: 0 !important;
      }
      body.close .sidebar-toggle span:nth-child(3) {
        transform: rotate(-45deg) translate(5px, -5px) !important;
      }

      /* Quitar espacio del buscador en el sidebar */
      .sidebar .search {
        margin-top: 80px !important;
        padding: 15px !important;
      }

      .markdown-section pre {
        margin: 1rem -0.2rem;
        font-size: 12px;
      }
    }

    @media screen and (max-width: 480px) {
      .content {
        padding-top: 50px !important;
      }

      /* Ajuste de imágenes para que no desborden */
      .markdown-section img {
        max-width: 100%;
        height: auto;
      }
    }
  </style>
</head>

<body>
  <!-- Efectos de Fondo -->
  <div id="matrix-bg"></div>
  <div class="bg-glow"></div>

  <div id="app">Cargando material académico...</div>
  <script>
    window.$docsify = {
      name: '👨‍💻 Prof: Enyerber Franco',
      repo: 'https://github.com/ever23/ContenidoProgramaticoUptt',
      loadSidebar: true,
      homepage: 'inicio.md', // <-- Desvincula el README y usa esta página como inicio
      subMaxLevel: 3,
      auto2top: true,

      // Opciones exclusivas de Themeable
      themeable: {
        readyTransition: true, // Transición suave al cargar
        responsiveTables: true  // Tablas que se adaptan a móviles
      },

      // Configuración del buscador
      search: {
        placeholder: 'Buscar un tema...',
        noData: 'No se encontraron resultados',
        depth: 3
      },

      // Plugins personalizados de Docsify
      plugins: [
        function (hook, vm) {
          hook.ready(function () {
            // Mueve el matrix-bg dentro del sidebar cuando Docsify esté listo
            const sidebar = document.querySelector('.sidebar');
            const matrixBg = document.getElementById('matrix-bg');
            if (sidebar && matrixBg) {
              sidebar.insertBefore(matrixBg, sidebar.firstChild);
            }
          });
        }
      ]
    }
  </script>

  <!-- Núcleo de Docsify -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>

  <!-- Plugin Themeable (Debe ir inmediatamente después del núcleo) -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>

  <!-- Plugins extra -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>

  <!-- Script para el fondo animado -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const matrixBg = document.getElementById('matrix-bg');
      if (matrixBg) {
        const snippets = [
          "class Nodo { Nodo* sig; int dato; }",
          "function dfs(nodo, visitados) { ... }",
          "SELECT id, nombre FROM estudiantes;",
          "sudo systemctl restart networking",
          "ping -c 4 192.168.1.1",
          "const app = express();",
          "public static void main(String[] args)",
          "def bubble_sort(arr):",
          "for(let i = 0; i < n; i++) { ... }",
          "ip route add 10.0.0.0/8 via 192.168.1.254",
          "document.getElementById('app').innerHTML",
          "try { await db.query(sql); } catch(e) {}",
          "std::cout << 'Hola Mundo' << std::endl;",
          "if (ip_address == '127.0.0.1') return;"
        ];

        function highlightCode(code) {
          return code
            .replace(/\b(async|await|const|let|var|function|class|public|static|void|if|else|while|for|return|import|from|export|new|select|from|where|update)\b/gi, '<span class="sh-keyword">$1</span>')
            .replace(/(['"`].*?['"`])/g, '<span class="sh-string">$1</span>')
            .replace(/\b(\w+)(?=\()/g, '<span class="sh-function">$1</span>')
            .replace(/(\/\/.*$)/gm, '<span class="sh-comment">$1</span>')
            .replace(/\b(\d+)\b/g, '<span class="sh-number">$1</span>');
        }

        const MAX_LINES = 25;

        function createCodeLine(initial = false) {
          if (matrixBg.children.length > MAX_LINES) matrixBg.removeChild(matrixBg.firstChild);

          const line = document.createElement('div');
          const duration = (Math.random() * 10 + 12); // Más lento (12-22 seg)
          line.className = 'code-line';
          line.innerHTML = highlightCode(snippets[Math.floor(Math.random() * snippets.length)]);
          line.style.left = Math.random() * 95 + '%';
          line.style.animationDuration = duration + 's';

          if (initial) line.style.animationDelay = '-' + (Math.random() * 15) + 's';

          matrixBg.appendChild(line);

          const cleanUp = () => { if (line.parentNode) line.remove(); };
          line.addEventListener('animationend', cleanUp);
          setTimeout(cleanUp, duration * 1000 + 100);
        }

        for (let i = 0; i < 15; i++) createCodeLine(true);
        setInterval(createCodeLine, 800);
      }
    });
  </script>
</body>

</html>
