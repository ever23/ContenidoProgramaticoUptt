<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteo Aleatorio de Exámenes - UPTT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 900px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin: 40px 0;
        }

        h1 {
            margin-top: 0;
            font-weight: 800;
            font-size: 2.5rem;
            background: linear-gradient(to right, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 10px;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .input-group {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            justify-content: center;
            flex-wrap: wrap;
            background: rgba(0,0,0,0.2);
            padding: 25px;
            border-radius: 16px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s ease;
            width: 200px;
            font-family: inherit;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 50px;
            align-self: flex-end;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }

        .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .team-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            animation: fadeIn 0.4s ease backwards;
            position: relative;
            overflow: hidden;
        }
        
        .team-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--accent);
            opacity: 0.7;
        }

        .team-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(52, 211, 153, 0.3);
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.3);
        }

        .team-name {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-left: 10px;
        }

        .team-number {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-main);
            background: rgba(16, 185, 129, 0.2);
            padding: 5px 15px;
            border-radius: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .summary-box {
            margin-top: 30px;
            padding: 20px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 16px;
            color: var(--text-main);
            animation: fadeIn 0.5s ease;
        }

        .summary-box h3 {
            margin-top: 0;
            color: #60a5fa;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .summary-box ul {
            margin: 0;
            padding-left: 20px;
            color: var(--text-muted);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ---------- Optimizaciones Móviles ---------- */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            .container {
                width: 100%;
                padding: 25px 15px;
                margin: 10px 0;
                box-sizing: border-box;
            }
            h1 {
                font-size: 1.8rem;
            }
            .subtitle {
                font-size: 0.95rem;
                margin-bottom: 25px;
            }
            .input-group {
                flex-direction: column;
                gap: 15px;
                padding: 15px;
            }
            .field {
                width: 100%;
            }
            input {
                width: 100%;
                box-sizing: border-box;
            }
            button {
                width: 100%;
                margin-top: 10px;
                height: 55px; /* Un poco más alto para tocar con el dedo fácilmente */
            }
            .team-card {
                flex-direction: column;
                text-align: center;
                gap: 12px;
                padding: 20px 15px;
            }
            .team-name {
                margin-left: 0;
            }
            .team-number {
                font-size: 1.4rem !important; /* Asegurar que no rompa la tarjeta en móviles */
                width: 100%;
                box-sizing: border-box;
            }
            .results {
                grid-template-columns: 1fr; /* Una sola columna en teléfonos */
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>👥 Asignación de Parejas</h1>
        <p class="subtitle">Sorteo para asignar alumnos sin PC a las máquinas ya ocupadas</p>
        
        <div class="input-group">
            <div class="field">
                <label for="numMaquinas">PCs ya Ocupadas (Alumnos sentados)</label>
                <input type="number" id="numMaquinas" placeholder="Ej: 10" min="1" max="100">
            </div>
            <div class="field">
                <label for="numAlumnos">Alumnos sin PC (Por asignar)</label>
                <input type="number" id="numAlumnos" placeholder="Ej: 8" min="1" max="200">
            </div>
            <button onclick="generarSorteo()">Asignar Parejas</button>
        </div>

        <div class="results" id="resultados">
            <!-- Cards se inyectarán aquí mediante JS -->
        </div>

        <div id="contenedor-resumen"></div>
    </div>

    <script>
        function generarSorteo() {
            const numMaquinas = parseInt(document.getElementById('numMaquinas').value);
            const numAlumnos = parseInt(document.getElementById('numAlumnos').value);
            const contenedor = document.getElementById('resultados');
            const contenedorResumen = document.getElementById('contenedor-resumen');
            
            if (isNaN(numMaquinas) || numMaquinas <= 0) {
                alert('Por favor ingrese cuántas máquinas están ocupadas.');
                return;
            }
            if (isNaN(numAlumnos) || numAlumnos <= 0) {
                alert('Por favor ingrese cuántos alumnos están sin PC.');
                return;
            }

            contenedor.innerHTML = '';
            contenedorResumen.innerHTML = '';

            let maquinasSorteo = [];
            
            // Llenar la bolsa con las máquinas disponibles
            for (let m = 1; m <= numMaquinas; m++) {
                maquinasSorteo.push(m);
            }
            // Barajar la bolsa (Algoritmo Fisher-Yates)
            for (let k = maquinasSorteo.length - 1; k > 0; k--) {
                const j = Math.floor(Math.random() * (k + 1));
                [maquinasSorteo[k], maquinasSorteo[j]] = [maquinasSorteo[j], maquinasSorteo[k]];
            }

            let asignaciones = [];
            let alumnosLibres = 0;

            // Asignar máquinas a los alumnos sin PC
            for (let i = 0; i < numAlumnos; i++) {
                if (maquinasSorteo.length > 0) {
                    asignaciones.push("Ir a PC #" + maquinasSorteo.pop());
                } else {
                    // Si ya se acabaron las máquinas, el alumno queda individual
                    asignaciones.push("Individual (Libre)");
                    alumnosLibres++;
                }
            }

            // IMPORTANTE: Barajar las asignaciones para que el alumno "Individual" sea aleatorio y no siempre el último.
            for (let k = asignaciones.length - 1; k > 0; k--) {
                const j = Math.floor(Math.random() * (k + 1));
                [asignaciones[k], asignaciones[j]] = [asignaciones[j], asignaciones[k]];
            }

            // Inyectar las tarjetas en el DOM
            for (let i = 0; i < numAlumnos; i++) {
                const card = document.createElement('div');
                card.className = 'team-card';
                card.style.animationDelay = `${(i + 1) * 0.03}s`;

                card.innerHTML = `
                    <span class="team-name">Alumno sin PC #${i + 1}</span>
                    <span class="team-number" style="font-size: ${asignaciones[i].includes('Individual') ? '1.2rem' : '1.8rem'}">
                        ${asignaciones[i]}
                    </span>
                `;
                
                contenedor.appendChild(card);
            }

            // Lo que quede en maquinasSorteo son las máquinas que se quedaron sin pareja (con 1 solo alumno)
            let maquinasSolas = maquinasSorteo.sort((a,b) => a-b);

            // Inyectar Resumen si aplica
            if (maquinasSolas.length > 0 || alumnosLibres > 0) {
                let htmlResumen = `<div class="summary-box"><h3>📊 Resumen de Desbalances</h3><ul>`;
                
                if (maquinasSolas.length > 0) {
                    htmlResumen += `<li>Las siguientes máquinas quedaron con <b>1 solo estudiante</b>: PC #${maquinasSolas.join(', PC #')}</li>`;
                }
                if (alumnosLibres > 0) {
                    htmlResumen += `<li>Hubo <b>${alumnosLibres} estudiante(s)</b> que se quedaron sin máquina y deberán trabajar de forma Individual.</li>`;
                }
                
                htmlResumen += `</ul></div>`;
                contenedorResumen.innerHTML = htmlResumen;
            }
        }
    </script>
</body>
</html>
